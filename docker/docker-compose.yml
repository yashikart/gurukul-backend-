# Gurukul stack: backends + frontends. Run from this directory: docker compose up --build
# Set DATABASE_URL, GURUKUL_API_BASE_URL, etc. in .env files or below.
# Frontends are built with API URLs pointing at localhost so the browser can reach the backends.

services:
  gurukul-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3000

  gurukul-frontend:
    build:
      context: ..
      dockerfile: Frontend/Dockerfile
      args:
        VITE_API_URL: "http://localhost:3000"
    ports:
      - "5173:80"
    depends_on:
      - gurukul-backend

  ems-backend:
    build:
      context: "../EMS System"
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - "../EMS System/.env"
    environment:
      - GURUKUL_API_BASE_URL=http://gurukul-backend:3000
    depends_on:
      - gurukul-backend

  ems-frontend:
    build:
      context: ..
      dockerfile: "./EMS System/frontend/Dockerfile"
    ports:
      - "3001:80"
    depends_on:
      - ems-backend
