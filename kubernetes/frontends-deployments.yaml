apiVersion: apps/v1
kind: Deployment
metadata:
  name: gurukul-frontend
  namespace: default
  labels:
    app: gurukul-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gurukul-frontend
  template:
    metadata:
      labels:
        app: gurukul-frontend
    spec:
      containers:
        - name: gurukul-frontend
          image: gurukul-frontend:prod-v1.0.0
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gurukul-frontend
  namespace: default
  labels:
    app: gurukul-frontend
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: gurukul-frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-backend
  namespace: default
  labels:
    app: ems-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ems-backend
  template:
    metadata:
      labels:
        app: ems-backend
    spec:
      containers:
        - name: ems-backend
          image: ems-backend:prod-v1.0.0
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: ems-database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: secret-key
---
apiVersion: v1
kind: Service
metadata:
  name: ems-backend
  namespace: default
  labels:
    app: ems-backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: ems-backend
  type: ClusterIP
---
