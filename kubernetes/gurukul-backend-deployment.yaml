apiVersion: apps/v1
kind: Deployment
metadata:
  name: gurukul-backend
  namespace: default
  labels:
    app: gurukul-backend
    tier: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gurukul-backend
  template:
    metadata:
      labels:
        app: gurukul-backend
        tier: api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - gurukul-backend
                topologyKey: "kubernetes.io/hostname"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gurukul-backend
      containers:
        - name: gurukul-backend
          image: gurukul-backend:prod-v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /system/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /system/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 2
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: database-url
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: mongodb-uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gurukul-secrets
                  key: secret-key
---
apiVersion: v1
kind: Service
metadata:
  name: gurukul-backend
  namespace: default
  labels:
    app: gurukul-backend
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: gurukul-backend
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gurukul-backend-pdb
  namespace: default
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: gurukul-backend
