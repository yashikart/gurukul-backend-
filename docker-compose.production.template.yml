services:

  gurukul-postgres:
    image: postgres:15-alpine
    container_name: gurukul_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - ./backend/.env
    volumes:
      - gurukul_postgres_data:/var/lib/postgresql/data
    networks:
      - gurukul_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  gurukul-backend:
    image: bhiv/gurukul-backend:IMG_TAG
    container_name: gurukul_backend
    ports:
      - "3002:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${GURUKUL_DATABASE_URL}
      - MONGO_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - EMS_API_BASE_URL=http://ems-backend:8000
      - ALLOWED_ORIGINS=http://${VM_IP}:5174,http://${VM_IP}:3001,http://${VM_IP}:3002,http://${VM_IP}:8001,http://localhost:5174,http://localhost:3001
    networks:
      - gurukul_network
    depends_on:
      gurukul-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  gurukul-frontend:
    image: bhiv/gurukul-frontend:IMG_TAG
    container_name: gurukul_frontend
    ports:
      - "5174:5174"
    networks:
      - gurukul_network
    depends_on:
      - gurukul-backend
    restart: unless-stopped

  ems-backend:
    image: bhiv/ems-backend:IMG_TAG
    container_name: ems_backend
    ports:
      - "8001:8000"
    env_file:
      - ./EMS-System/.env
    environment:
      - DATABASE_URL=${EMS_DATABASE_URL}
      - GURUKUL_API_BASE_URL=http://gurukul-backend:3000
      - FRONTEND_URL=http://${VM_IP}:3001
      - ALLOWED_ORIGINS=http://${VM_IP}:5174,http://${VM_IP}:3001,http://${VM_IP}:3002,http://${VM_IP}:8001,http://localhost:5174,http://localhost:3001
    networks:
      - gurukul_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ems-frontend:
    image: bhiv/ems-frontend:IMG_TAG
    container_name: ems_frontend
    ports:
      - "3001:3001"
    networks:
      - gurukul_network
    depends_on:
      - ems-backend
    restart: unless-stopped

networks:
  gurukul_network:
    driver: bridge

volumes:
  gurukul_postgres_data:

