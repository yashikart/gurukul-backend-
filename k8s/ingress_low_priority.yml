apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress-low
  namespace: gurukul-staging
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    nginx.ingress.kubernetes.io/limit-status-code: "429"
spec:
  rules:
  - host: low.gurukul.local
    http:
      paths:
      - path: /api/v1/tts
        pathType: Prefix
        backend:
          service:
            name: gurukul-backend
            port:
              number: 80
      - path: /api/v1/agent/tts
        pathType: Prefix
        backend:
          service:
            name: gurukul-backend
            port:
              number: 80
      - path: /api/generate
        pathType: Prefix
        backend:
          service:
            name: tts-service
            port:
              number: 80
      - path: /api/audio
        pathType: Prefix
        backend:
          service:
            name: tts-service
            port:
              number: 80
