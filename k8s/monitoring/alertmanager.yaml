apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: gurukul-staging
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 5s
      group_interval: 5s
      repeat_interval: 10m
      receiver: 'stdout-receiver'

    receivers:
    - name: 'stdout-receiver'
      # Standard local receiver to print firing alerts straight into standard pod logs
      webhook_configs:
      - url: 'http://127.0.0.1:9093/webhook-dump-stub'

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: gurukul-staging
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.25.0
        args:
        - "--config.file=/etc/alertmanager/alertmanager.yml"
        - "--storage.path=/alertmanager"
        ports:
        - containerPort: 9093
          name: api
        volumeMounts:
        - name: config-volume
          mountPath: /etc/alertmanager
        - name: storage-volume
          mountPath: /alertmanager
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config-volume
        configMap:
          name: alertmanager-config
      - name: storage-volume
        emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: gurukul-staging
  labels:
    app: alertmanager
spec:
  ports:
  - port: 9093
    targetPort: 9093
    name: api
  selector:
    app: alertmanager
  type: ClusterIP
