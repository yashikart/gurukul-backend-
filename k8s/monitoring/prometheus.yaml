apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gurukul-staging
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    rule_files:
      - "/etc/prometheus/alert.rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - 'alertmanager.gurukul-staging.svc.cluster.local:9093'

    scrape_configs:
      - job_name: 'gurukul-backend'
        static_configs:
          - targets: ['gurukul-backend.gurukul-staging.svc.cluster.local:80']
            labels:
              group: 'backend'

  alert.rules.yml: |
    groups:
      - name: gurukul_alerts
        rules:
          - alert: DatabaseConnectionLost
            expr: gurukul_database_healthy == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL connection lost"
              description: "FastAPI backend has lost ping connectivity to school_management_db."

          - alert: APIHighErrorRate
            expr: (rate(gurukul_errors_total[2m]) / rate(gurukul_requests_total[2m])) * 100 > 5
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "API Error rate exceeds 5%"
              description: "Active HTTP 5xx error rate is currently {{ $value }}%."

          - alert: TTSQueueOverloaded
            expr: gurukul_tts_backlog_count > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "XTTS Speech Backlog saturated"
              description: "Speech queue currently has {{ $value }} pending items, indicating potential worker deadlock."

          - alert: HighVoiceLatency
            expr: gurukul_voice_latency_seconds_avg > 0.5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "TTS Inference Latency degraded"
              description: "Average TTS generation time is {{ $value }}s, exceeding SLA of 500ms."

          - alert: CPUUsageWarning
            expr: gurukul_cpu_usage_ratio > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU utilization warning"
              description: "Container namespace CPU is currently running at {{ $value }}."

          - alert: MemoryUsageCritical
            expr: gurukul_memory_usage_ratio > 0.9
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Memory usage critical saturation"
              description: "Container namespace memory is at {{ $value }}, risking OOM-kill."

          - alert: UnusualTrafficSpike
            expr: rate(gurukul_requests_total[2m]) > 2500
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High throughput anomaly detected"
              description: "API request rate has surged to {{ $value }} RPS, signalling potential stress burst or DDoS."

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gurukul-staging
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        - name: storage-volume
          mountPath: /prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
      - name: storage-volume
        emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gurukul-staging
  labels:
    app: prometheus
spec:
  ports:
  - port: 9090
    targetPort: 9090
    name: web
  selector:
    app: prometheus
  type: ClusterIP
